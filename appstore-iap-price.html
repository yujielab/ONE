<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Store 内购全球价格查询</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }
    header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid #d2d2d7;
      padding: 16px 24px;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header p { font-size: 13px; color: #6e6e73; margin-top: 2px; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .search-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }
    .search-row {
      display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
    }
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
    .field label { font-size: 13px; font-weight: 500; color: #6e6e73; }
    .field input, .field select {
      border: 1.5px solid #d2d2d7;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      background: #fafafa;
    }
    .field input:focus, .field select:focus { border-color: #0071e3; background: #fff; }
    .btn {
      padding: 10px 24px;
      border: none; border-radius: 10px;
      cursor: pointer; font-size: 15px; font-weight: 500;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #0071e3; color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary { background: #e8e8ed; color: #1d1d1f; }
    .btn-secondary:hover { opacity: .75; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .hint { font-size: 12px; color: #6e6e73; margin-top: 10px; }
    .hint a { color: #0071e3; text-decoration: none; }

    /* App info bar */
    #app-info {
      background: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
      border-radius: 14px; padding: 20px 24px;
      color: #fff; margin-bottom: 24px;
      display: none; align-items: center; gap: 16px;
    }
    #app-info img { width: 60px; height: 60px; border-radius: 14px; flex-shrink: 0; }
    #app-info .info-text h2 { font-size: 18px; font-weight: 600; }
    #app-info .info-text p { font-size: 13px; opacity: .85; margin-top: 3px; }

    /* Controls */
    .controls {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap; margin-bottom: 18px;
    }
    .controls span { font-size: 14px; color: #6e6e73; }
    .filter-input {
      border: 1.5px solid #d2d2d7; border-radius: 8px;
      padding: 7px 12px; font-size: 14px; outline: none;
      flex: 1; min-width: 160px; max-width: 280px;
      transition: border-color .2s;
    }
    .filter-input:focus { border-color: #0071e3; }
    .sort-btn {
      font-size: 13px; padding: 6px 14px;
      background: #e8e8ed; border: none; border-radius: 8px;
      cursor: pointer; font-weight: 500;
    }
    .sort-btn.active { background: #0071e3; color: #fff; }

    /* IAP list */
    #iap-section { display: none; }
    .iap-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .iap-header {
      padding: 18px 22px; border-bottom: 1px solid #f0f0f5;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .iap-header .iap-name { font-size: 16px; font-weight: 600; }
    .iap-header .iap-meta { font-size: 12px; color: #6e6e73; margin-top: 2px; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
    }
    .badge-sub { background: #fff3cd; color: #856404; }
    .badge-onetime { background: #d1e7dd; color: #0a3622; }
    .badge-consume { background: #cfe2ff; color: #084298; }

    .price-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #f5f5f7; font-size: 12px; font-weight: 600;
      color: #6e6e73; text-transform: uppercase; letter-spacing: .4px;
      padding: 10px 16px; text-align: left; white-space: nowrap;
      position: sticky; top: 0;
    }
    td { padding: 10px 16px; font-size: 14px; border-top: 1px solid #f0f0f5; }
    tr:hover td { background: #f9f9fc; }
    .price-usd { color: #6e6e73; font-size: 12px; margin-top: 1px; }
    .flag { font-size: 18px; margin-right: 6px; }
    .country-cell { display: flex; align-items: center; white-space: nowrap; }

    /* Progress */
    #progress-wrap { margin-bottom: 20px; display: none; }
    .progress-bar-bg {
      background: #e8e8ed; border-radius: 4px; height: 6px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: linear-gradient(90deg, #0071e3, #34aadc);
      border-radius: 4px; transition: width .3s; width: 0%;
    }
    #progress-text { font-size: 13px; color: #6e6e73; margin-top: 6px; }

    /* Status messages */
    .status-msg {
      text-align: center; padding: 40px 20px;
      color: #6e6e73; font-size: 15px; display: none;
    }
    .status-msg .icon { font-size: 40px; margin-bottom: 12px; }
    .error-msg { color: #d70015; }

    /* Summary row */
    .summary {
      display: flex; gap: 16px; padding: 12px 22px;
      background: #f5f5f7; flex-wrap: wrap;
    }
    .summary-item { font-size: 13px; color: #6e6e73; }
    .summary-item strong { color: #1d1d1f; }

    @media (max-width: 600px) {
      .search-row { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>App Store 内购全球价格查询</h1>
  <p>查询 App 内购项目在全球各区域的定价</p>
</header>

<div class="container">

  <!-- Search Card -->
  <div class="search-card">
    <div class="search-row">
      <div class="field">
        <label>App ID 或 App 名称</label>
        <input type="text" id="appInput" placeholder="例：6443709359  或  Procreate" />
      </div>
      <div class="field" style="max-width:180px">
        <label>参考区域</label>
        <select id="baseCountry">
          <option value="us">🇺🇸 美国 (USD)</option>
          <option value="cn">🇨🇳 中国 (CNY)</option>
          <option value="gb">🇬🇧 英国 (GBP)</option>
          <option value="jp">🇯🇵 日本 (JPY)</option>
        </select>
      </div>
      <button class="btn btn-primary" id="searchBtn" onclick="startSearch()">查询</button>
      <button class="btn btn-secondary" onclick="resetAll()">重置</button>
    </div>
    <p class="hint">
      App ID 可在 App Store 链接中找到，例：
      <a href="#" onclick="setExample('6443709359');return false">6443709359</a>（示例）。
      输入名称时将先搜索再查询。
    </p>
  </div>

  <!-- App Info -->
  <div id="app-info">
    <img id="app-icon" src="" alt="">
    <div class="info-text">
      <h2 id="app-title"></h2>
      <p id="app-subtitle"></p>
    </div>
  </div>

  <!-- Progress -->
  <div id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
    <div id="progress-text">正在查询...</div>
  </div>

  <!-- Status -->
  <div class="status-msg" id="status-loading">
    <div class="icon">⏳</div>正在初始化...
  </div>
  <div class="status-msg error-msg" id="status-error">
    <div class="icon">⚠️</div>
    <span id="error-text">查询失败，请检查 App ID 是否正确。</span>
  </div>

  <!-- IAP Results -->
  <div id="iap-section">
    <div class="controls">
      <span id="result-count"></span>
      <input class="filter-input" type="text" id="filterInput"
             placeholder="筛选内购名称..." oninput="renderTables()" />
      <button class="sort-btn" id="sort-price-btn" onclick="toggleSort('price')">按价格排序</button>
      <button class="sort-btn" id="sort-name-btn" onclick="toggleSort('name')">按名称排序</button>
    </div>
    <div id="iap-cards"></div>
  </div>

</div>

<script>
// ─── Country List ──────────────────────────────────────────────────────────
const COUNTRIES = [
  {code:'us', name:'美国', flag:'🇺🇸', currency:'USD'},
  {code:'cn', name:'中国', flag:'🇨🇳', currency:'CNY'},
  {code:'gb', name:'英国', flag:'🇬🇧', currency:'GBP'},
  {code:'de', name:'德国', flag:'🇩🇪', currency:'EUR'},
  {code:'fr', name:'法国', flag:'🇫🇷', currency:'EUR'},
  {code:'it', name:'意大利', flag:'🇮🇹', currency:'EUR'},
  {code:'es', name:'西班牙', flag:'🇪🇸', currency:'EUR'},
  {code:'nl', name:'荷兰', flag:'🇳🇱', currency:'EUR'},
  {code:'ru', name:'俄罗斯', flag:'🇷🇺', currency:'RUB'},
  {code:'jp', name:'日本', flag:'🇯🇵', currency:'JPY'},
  {code:'kr', name:'韩国', flag:'🇰🇷', currency:'KRW'},
  {code:'hk', name:'香港', flag:'🇭🇰', currency:'HKD'},
  {code:'tw', name:'台湾', flag:'🇹🇼', currency:'TWD'},
  {code:'sg', name:'新加坡', flag:'🇸🇬', currency:'SGD'},
  {code:'au', name:'澳大利亚', flag:'🇦🇺', currency:'AUD'},
  {code:'nz', name:'新西兰', flag:'🇳🇿', currency:'NZD'},
  {code:'ca', name:'加拿大', flag:'🇨🇦', currency:'CAD'},
  {code:'mx', name:'墨西哥', flag:'🇲🇽', currency:'MXN'},
  {code:'br', name:'巴西', flag:'🇧🇷', currency:'BRL'},
  {code:'in', name:'印度', flag:'🇮🇳', currency:'INR'},
  {code:'tr', name:'土耳其', flag:'🇹🇷', currency:'TRY'},
  {code:'sa', name:'沙特', flag:'🇸🇦', currency:'SAR'},
  {code:'ae', name:'阿联酋', flag:'🇦🇪', currency:'AED'},
  {code:'se', name:'瑞典', flag:'🇸🇪', currency:'SEK'},
  {code:'no', name:'挪威', flag:'🇳🇴', currency:'NOK'},
  {code:'dk', name:'丹麦', flag:'🇩🇰', currency:'DKK'},
  {code:'ch', name:'瑞士', flag:'🇨🇭', currency:'CHF'},
  {code:'pl', name:'波兰', flag:'🇵🇱', currency:'PLN'},
  {code:'cz', name:'捷克', flag:'🇨🇿', currency:'CZK'},
  {code:'th', name:'泰国', flag:'🇹🇭', currency:'THB'},
  {code:'id', name:'印尼', flag:'🇮🇩', currency:'IDR'},
  {code:'my', name:'马来西亚', flag:'🇲🇾', currency:'MYR'},
  {code:'ph', name:'菲律宾', flag:'🇵🇭', currency:'PHP'},
  {code:'vn', name:'越南', flag:'🇻🇳', currency:'VND'},
  {code:'za', name:'南非', flag:'🇿🇦', currency:'ZAR'},
  {code:'eg', name:'埃及', flag:'🇪🇬', currency:'EGP'},
  {code:'il', name:'以色列', flag:'🇮🇱', currency:'ILS'},
  {code:'pk', name:'巴基斯坦', flag:'🇵🇰', currency:'PKR'},
  {code:'ar', name:'阿根廷', flag:'🇦🇷', currency:'ARS'},
  {code:'cl', name:'智利', flag:'🇨🇱', currency:'CLP'},
  {code:'co', name:'哥伦比亚', flag:'🇨🇴', currency:'COP'},
  {code:'pe', name:'秘鲁', flag:'🇵🇪', currency:'PEN'},
  {code:'ro', name:'罗马尼亚', flag:'🇷🇴', currency:'RON'},
  {code:'hu', name:'匈牙利', flag:'🇭🇺', currency:'HUF'},
];

// ─── State ──────────────────────────────────────────────────────────────────
let iapData = {};      // { productId: { name, type, prices: {countryCode: {price, currency, formattedPrice}} } }
let sortMode = null;   // 'price' | 'name' | null
let sortDir = 'asc';

// ─── Helpers ────────────────────────────────────────────────────────────────
function setExample(id) { document.getElementById('appInput').value = id; }
function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showBlock(id) { document.getElementById(id).style.display = 'block'; }

function resetAll() {
  iapData = {};
  hide('app-info');
  hide('progress-wrap');
  hide('status-loading');
  hide('status-error');
  document.getElementById('iap-section').style.display = 'none';
  document.getElementById('iap-cards').innerHTML = '';
  document.getElementById('filterInput').value = '';
  document.getElementById('searchBtn').disabled = false;
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function setProgress(done, total, msg) {
  showBlock('progress-wrap');
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = msg || `已查询 ${done}/${total} 个区域`;
}

// ─── Search & Fetch ──────────────────────────────────────────────────────────
async function startSearch() {
  const raw = document.getElementById('appInput').value.trim();
  if (!raw) { alert('请输入 App ID 或名称'); return; }
  resetAll();
  document.getElementById('searchBtn').disabled = true;

  try {
    let appId = raw;

    // If not numeric, search first
    if (!/^\d+$/.test(raw)) {
      showBlock('status-loading');
      document.getElementById('status-loading').querySelector('div+*') &&
        (document.getElementById('status-loading').lastChild.textContent = `正在搜索"${raw}"...`);
      document.getElementById('status-loading').innerHTML = `<div class="icon">🔍</div>正在搜索"${raw}"...`;
      show('status-loading');
      const base = document.getElementById('baseCountry').value;
      const searchUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(raw)}&entity=software&country=${base}&limit=5`;
      const searchData = await fetchJSON(searchUrl);
      hide('status-loading');
      if (!searchData.results || searchData.results.length === 0) {
        showError(`未找到应用"${raw}"，请尝试直接输入 App ID`);
        return;
      }
      appId = String(searchData.results[0].trackId);
    }

    await queryAllRegions(appId);
  } catch (e) {
    hide('status-loading');
    showError('查询失败：' + e.message);
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

async function queryAllRegions(appId) {
  // Step 1: get app info from base country
  const base = document.getElementById('baseCountry').value;
  setProgress(0, COUNTRIES.length, '正在获取 App 信息...');
  const appLookup = await fetchJSON(
    `https://itunes.apple.com/lookup?id=${appId}&entity=software&country=${base}`
  );
  if (!appLookup.results || appLookup.results.length === 0) {
    showError(`找不到 App ID: ${appId}，请确认 ID 正确且该 App 在所选区域上架。`);
    return;
  }

  const app = appLookup.results[0];
  document.getElementById('app-icon').src = app.artworkUrl100 || '';
  document.getElementById('app-title').textContent = app.trackName || 'Unknown App';
  document.getElementById('app-subtitle').textContent =
    `${app.artistName || ''} · App ID: ${appId}`;
  show('app-info');

  // Step 2: query all countries in batches
  iapData = {};
  const BATCH = 5;
  let done = 0;

  for (let i = 0; i < COUNTRIES.length; i += BATCH) {
    const batch = COUNTRIES.slice(i, i + BATCH);
    await Promise.all(batch.map(async (c) => {
      try {
        const data = await fetchJSON(
          `https://itunes.apple.com/lookup?id=${appId}&entity=inAppPurchase&country=${c.code}&limit=200`
        );
        const iaps = (data.results || []).filter(r => r.wrapperType === 'inAppPurchase');
        iaps.forEach(iap => {
          const key = iap.productId || iap.trackName;
          if (!iapData[key]) {
            iapData[key] = {
              name: iap.trackName,
              type: iap.formattedPrice === 'Free' ? 'free' :
                    (iap.subscriptionPeriod ? 'subscription' : 'onetime'),
              productId: iap.productId,
              prices: {}
            };
          }
          iapData[key].prices[c.code] = {
            price: iap.price,
            currency: iap.currencyCode || c.currency,
            formattedPrice: iap.formattedPrice
          };
        });
      } catch (_) { /* skip unavailable regions */ }
      done++;
    }));
    setProgress(done, COUNTRIES.length, `已查询 ${done}/${COUNTRIES.length} 个区域，发现 ${Object.keys(iapData).length} 个内购项目`);
  }

  hide('progress-wrap');

  if (Object.keys(iapData).length === 0) {
    showError('该 App 在查询的区域中未发现内购项目，或 App 不包含内购。');
    return;
  }

  document.getElementById('result-count').textContent =
    `共找到 ${Object.keys(iapData).length} 个内购项目`;
  document.getElementById('iap-section').style.display = 'block';
  renderTables();
}

// ─── Render ──────────────────────────────────────────────────────────────────
function toggleSort(mode) {
  if (sortMode === mode) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortMode = mode;
    sortDir = 'asc';
  }
  document.getElementById('sort-price-btn').classList.toggle('active', sortMode === 'price');
  document.getElementById('sort-name-btn').classList.toggle('active', sortMode === 'name');
  renderTables();
}

function renderTables() {
  const filter = document.getElementById('filterInput').value.toLowerCase();
  let keys = Object.keys(iapData).filter(k =>
    iapData[k].name.toLowerCase().includes(filter) ||
    k.toLowerCase().includes(filter)
  );

  if (sortMode === 'name') {
    keys.sort((a, b) => {
      const cmp = iapData[a].name.localeCompare(iapData[b].name);
      return sortDir === 'asc' ? cmp : -cmp;
    });
  } else if (sortMode === 'price') {
    keys.sort((a, b) => {
      const pa = iapData[a].prices['us']?.price ?? 9999;
      const pb = iapData[b].prices['us']?.price ?? 9999;
      return sortDir === 'asc' ? pa - pb : pb - pa;
    });
  }

  document.getElementById('result-count').textContent =
    `共 ${Object.keys(iapData).length} 个内购项目` +
    (filter ? `，筛选显示 ${keys.length} 个` : '');

  const container = document.getElementById('iap-cards');
  container.innerHTML = '';

  keys.forEach(key => {
    const item = iapData[key];
    const card = document.createElement('div');
    card.className = 'iap-card';

    // Available countries
    const available = COUNTRIES.filter(c => item.prices[c.code] !== undefined);
    const unavailable = COUNTRIES.filter(c => item.prices[c.code] === undefined);

    // Badge type
    let badgeHtml = '';
    if (item.type === 'subscription') {
      badgeHtml = '<span class="badge badge-sub">订阅</span>';
    } else if (item.type === 'free') {
      badgeHtml = '<span class="badge badge-consume">免费</span>';
    } else {
      badgeHtml = '<span class="badge badge-onetime">一次性</span>';
    }

    // Price summary (min/max USD)
    const usdPrices = available.map(c => item.prices[c.code]?.price).filter(p => p != null && p > 0);
    let summaryHtml = '';
    if (usdPrices.length) {
      const minP = Math.min(...usdPrices);
      const maxP = Math.max(...usdPrices);
      const minC = available.find(c => item.prices[c.code]?.price === minP);
      const maxC = available.find(c => item.prices[c.code]?.price === maxP);
      summaryHtml = `
        <div class="summary">
          <div class="summary-item">上架区域：<strong>${available.length}</strong></div>
          <div class="summary-item">未上架：<strong>${unavailable.length}</strong></div>
          ${minC ? `<div class="summary-item">最低价：<strong>${minC.flag} ${item.prices[minC.code].formattedPrice}</strong></div>` : ''}
          ${maxC ? `<div class="summary-item">最高价：<strong>${maxC.flag} ${item.prices[maxC.code].formattedPrice}</strong></div>` : ''}
        </div>`;
    }

    // Table rows
    const rows = available.map(c => {
      const p = item.prices[c.code];
      const displayPrice = p.formattedPrice || `${p.currency} ${p.price?.toFixed(2)}`;
      return `
        <tr>
          <td><div class="country-cell"><span class="flag">${c.flag}</span>${c.name}</div></td>
          <td>${c.code.toUpperCase()}</td>
          <td>${p.currency}</td>
          <td><strong>${displayPrice}</strong></td>
        </tr>`;
    }).join('');

    card.innerHTML = `
      <div class="iap-header">
        <div>
          <div class="iap-name">${escHtml(item.name)}</div>
          <div class="iap-meta">${escHtml(item.productId || key)}</div>
        </div>
        <div>${badgeHtml}</div>
      </div>
      ${summaryHtml}
      <div class="price-table-wrap">
        <table>
          <thead>
            <tr>
              <th>区域</th><th>国家代码</th><th>货币</th><th>价格</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    container.appendChild(card);
  });
}

function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  showBlock('status-error');
  show('status-error');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key
document.getElementById('appInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSearch();
});
</script>
</body>
</html>
